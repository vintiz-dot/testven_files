<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdTech Capstone – Technology Infrastructure & Integration Report</title>
  <meta name="description" content="A scholarly infrastructure report evaluating technology integration, device utilization, and pedagogical vision across stakeholder groups." />

  <!-- Google Fonts: Inter + DM Serif for academic contrast -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- prop-types (Recharts peer dep) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    :root {
      --navy:   #0d1b2a;
      --blue:   #1d6fde;
      --indigo: #4f46e5;
      --gold:   #f59e0b;
      --slate:  #64748b;
      --surface:#f8fafc;
      --card:   #ffffff;
      --border: #e2e8f0;
    }

    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--surface); color: #1e293b; }
    h1, h2 { font-family: 'DM Serif Display', serif; }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; }                             to { opacity:1; }                          }
    @keyframes shimmer  { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

    .fade-up    { animation: fadeUp  .45s cubic-bezier(.22,1,.36,1) both; }
    .fade-in    { animation: fadeIn  .3s ease both; }

    /* ── Gradient title ── */
    .grad-text {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-height: 100vh;
      background: linear-gradient(180deg, #0d1b2a 0%, #0f2847 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 4px 0 32px rgba(0,0,0,.35);
      z-index: 10;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; border-radius: 10px;
      border: none; cursor: pointer; width: 100%;
      font-size: 14px; font-weight: 500; text-align: left;
      transition: all .2s; color: #94a3b8; background: transparent;
    }
    .nav-btn:hover  { background: rgba(255,255,255,.07); color: #e2e8f0; }
    .nav-btn.active { background: linear-gradient(135deg,#1d6fde,#4f46e5); color:#fff; box-shadow: 0 4px 20px rgba(29,111,222,.4); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
      padding: 28px;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.08); transform: translateY(-2px); }

    /* ── Stat card ── */
    .stat-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: box-shadow .2s, transform .2s;
    }
    .stat-card:hover { box-shadow: 0 6px 24px rgba(29,111,222,.12); transform: translateY(-2px); }

    /* ── Pull quote ── */
    .pull-quote {
      border-left: 4px solid var(--blue);
      padding: 18px 24px;
      background: linear-gradient(135deg,rgba(29,111,222,.06),rgba(79,70,229,.06));
      border-radius: 0 12px 12px 0;
      font-style: italic; font-size: 1.05rem; color: #1e3a8a;
      line-height: 1.75;
    }

    /* ── Citation ── */
    .citation-box {
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; color: #475569; font-style: italic;
      margin-top: 8px; line-height: 1.6;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--blue); margin-bottom: 6px;
    }

    /* ── Image figure ── */
    .fig-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .fig-caption { font-size: 12px; color: var(--slate); padding: 10px 14px; background: #f8fafc; border-top: 1px solid var(--border); font-style: italic; }

    /* ── SAMR badge ── */
    .samr-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; border: 1.5px solid;
    }

    /* ── Timeline step ── */
    .step-card {
      display: flex; gap: 16px; align-items: flex-start;
      background: var(--card); padding: 20px 22px;
      border-radius: 14px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: box-shadow .2s, transform .2s;
    }
    .step-card:hover { box-shadow: 0 6px 24px rgba(79,70,229,.12); transform: translateY(-1px); }
    .step-num {
      flex-shrink: 0; width: 34px; height: 34px;
      border-radius: 50%; background: linear-gradient(135deg,#1d6fde,#4f46e5);
      color: #fff; font-weight: 700; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(29,111,222,.3);
    }

    /* ── Works cited ── */
    .ref-item { padding: 14px 18px; border-left: 3px solid #e2e8f0; margin-bottom: 12px; font-size: 13.5px; line-height: 1.7; color: #334155; }
    .ref-item:hover { border-left-color: var(--blue); background: rgba(29,111,222,.04); border-radius: 0 8px 8px 0; }

    /* ── Badge pill ── */
    .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

    /* ── Main layout ── */
    #layout { display: flex; min-height: 100vh; }
    #main   { flex: 1; padding: 40px 48px; overflow-y: auto; max-width: 900px; }

    @media (max-width: 768px) {
      #sidebar { width: 100%; min-height: auto; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 16px; }
      #layout  { flex-direction: column; }
      #main    { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<div id="root">
  <div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#64748b;font-family:Inter,sans-serif;">
    Loading report…
  </div>
</div>

<script>
// ───────────────────────────────────────────────
//  React + Recharts globals
// ───────────────────────────────────────────────
const e = React.createElement;
const { useState } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
  ResponsiveContainer, PieChart, Pie, Cell, Legend,
  RadarChart, Radar, PolarGrid, PolarAngleAxis
} = Recharts;

// ───────────────────────────────────────────────
//  Inline SVG icons
// ───────────────────────────────────────────────
function SvgIcon(paths, { size=18, color='currentColor', className='' } = {}) {
  return e('svg', {
    xmlns:'http://www.w3.org/2000/svg', width:size, height:size,
    viewBox:'0 0 24 24', fill:'none', stroke:color,
    strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round',
    className, style:{ flexShrink:0 },
    dangerouslySetInnerHTML:{__html:paths}
  });
}
const I = {
  Grid    : p => SvgIcon('<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>', p),
  Bulb    : p => SvgIcon('<line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14z"/>', p),
  Users   : p => SvgIcon('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', p),
  Server  : p => SvgIcon('<rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>', p),
  Trend   : p => SvgIcon('<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>', p),
  Book    : p => SvgIcon('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>', p),
  Monitor : p => SvgIcon('<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>', p),
  Wifi    : p => SvgIcon('<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r=".5" fill="currentColor"/>', p),
  Alert   : p => SvgIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/>', p),
  Check   : p => SvgIcon('<polyline points="20 6 9 17 4 12"/>', p),
  Quote   : p => SvgIcon('<path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>', p),
  Cite    : p => SvgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>', p),
};

// ───────────────────────────────────────────────
//  Chart data
// ───────────────────────────────────────────────
const challengeData = [
  { name: 'Wi-Fi / Connectivity', votes: 8 },
  { name: 'Student Distraction',  votes: 7 },
  { name: 'Hardware Damage',      votes: 5 },
  { name: 'Lack of Training',     votes: 4 },
];
const preferenceData = [
  { name: 'iPads / Tablets',  value: 45 },
  { name: 'Chromebooks',      value: 35 },
  { name: 'Teacher Laptops',  value: 15 },
  { name: 'Desktops',         value: 5  },
];
const COLORS = ['#1d6fde','#8b5cf6','#10b981','#f59e0b'];

// ───────────────────────────────────────────────
//  Reusable components
// ───────────────────────────────────────────────
function StatCard({ iconEl, label, value, sub, color='#1d6fde', bg='#eff6ff' }) {
  return e('div', { className:'stat-card' },
    e('div', { style:{ padding:'12px', borderRadius:'10px', background:bg } }, iconEl),
    e('div', null,
      e('p', { style:{ fontSize:12, fontWeight:600, color:'#64748b', textTransform:'uppercase', letterSpacing:'1px' } }, label),
      e('p', { style:{ fontSize:22, fontWeight:700, color:'#0f172a', lineHeight:1.2 } }, value),
      sub && e('p', { style:{ fontSize:12, color:'#94a3b8', marginTop:2 } }, sub)
    )
  );
}

function SectionLabel({ text }) {
  return e('p', { className:'section-label' }, text);
}

function PullQuote({ children }) {
  return e('blockquote', { className:'pull-quote' },
    e('span', { style:{float:'left', marginRight:10, opacity:.4, fontSize:28, lineHeight:1 } }, I.Quote({ size:28, color:'#1d6fde' })),
    children
  );
}

function StepCard({ num, title, desc }) {
  return e('div', { className:'step-card' },
    e('div', { className:'step-num' }, num),
    e('div', null,
      e('h3', { style:{ fontWeight:700, fontSize:16, color:'#0f172a', marginBottom:4 } }, title),
      e('p',  { style:{ color:'#475569', lineHeight:1.65, fontSize:14 } }, desc)
    )
  );
}

function FigureCard({ src, caption, caption2 }) {
  return e('div', { className:'fig-wrap' },
    e('img', { src, alt:caption, style:{ width:'100%', display:'block', maxHeight:320, objectFit:'cover' } }),
    e('div', { className:'fig-caption' },
      e('strong', null, caption),
      caption2 && e('span', null, ' — ' + caption2)
    )
  );
}

function Tag({ text, color='#1d6fde', bg='#eff6ff' }) {
  return e('span', { className:'pill', style:{ background:bg, color } }, text);
}

// ───────────────────────────────────────────────
//  TAB PANELS
// ───────────────────────────────────────────────

/* ── 1. OVERVIEW ─────────────────────────────── */
function OverviewPanel() {
  return e('div', { className:'fade-up' },
    e(SectionLabel, { text:'EdTech Capstone Report · Spring 2025' }),
    e('h2', { style:{ fontSize:32, marginBottom:6, color:'#0f172a', lineHeight:1.2 } }, 'Technology Infrastructure & Integration Report'),
    e('p', { style:{ color:'#64748b', fontSize:15, marginBottom:32, lineHeight:1.7 } },
      'A multi-stakeholder analysis of current device utilization, network infrastructure, and pedagogical vision, with research-backed recommendations for sustainable technology integration.'
    ),

    // Stat row
    e('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:16, marginBottom:32 } },
      e(StatCard, { iconEl:I.Users({ size:22, color:'#1d6fde' }), label:'Stakeholder Groups', value:'3', sub:'Admin · IT · Teachers', color:'#1d6fde', bg:'#eff6ff' }),
      e(StatCard, { iconEl:I.Monitor({ size:22, color:'#7c3aed' }), label:'Target Device Ratio', value:'1:1', sub:'Phased K–12 rollout', color:'#7c3aed', bg:'#f5f3ff' }),
      e(StatCard, { iconEl:I.Book({ size:22, color:'#0891b2' }), label:'Framework', value:'TPACK', sub:'+ SAMR integration model', color:'#0891b2', bg:'#ecfeff' }),
      e(StatCard, { iconEl:I.Trend({ size:22, color:'#059669' }), label:'Methodology', value:'Mixed', sub:'Interviews + surveys', color:'#059669', bg:'#ecfdf5' })
    ),

    // Abstract
    e('div', { className:'card', style:{ marginBottom:24 } },
      e(SectionLabel, { text:'Introduction' }),
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:20, marginBottom:12 } }, 'Executive Summary'),
      e('p', { style:{ color:'#334155', lineHeight:1.8, marginBottom:12, fontSize:15 } },
        'This report evaluates the current technological infrastructure, device utilization, and pedagogical vision at our campus to inform future technology integration strategies. Employing a mixed-methods approach — combining semi-structured stakeholder interviews with a structured multi-grade teacher survey — the study synthesizes the perspectives of campus administration, the Information Technology (IT) directorate, and classroom practitioners.'
      ),
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15 } },
        'Findings reveal a campus operating predominantly at the lower tiers of the SAMR model, constrained by infrastructure gaps, heterogeneous hardware ecosystems, and insufficient pedagogy-focused professional development. This report concludes with a staged action plan grounded in the TPACK framework and supported by peer-reviewed evidence, offering a roadmap from the current fragmented state toward a cohesive, inquiry-driven digital learning environment.'
      )
    ),

    // Survey CTA
    e('div', { style:{ background:'linear-gradient(135deg,#eff6ff,#f5f3ff)', border:'2px solid #818cf8', borderRadius:14, padding:'18px 22px', marginBottom:24, display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, flexWrap:'wrap' } },
      e('div', null,
        e('p', { style:{ fontWeight:700, color:'#1e3a8a', marginBottom:4, fontSize:15 } }, '📋 Contribute to This Research'),
        e('p', { style:{ fontSize:13, color:'#475569', margin:0, lineHeight:1.6 } }, 'Complete the 2–3 minute Teacher Technology Survey to add your campus data to this analysis.')
      ),
      e('a', { href:'./capstone.html', target:'_blank', style:{ display:'inline-flex', alignItems:'center', gap:6, padding:'10px 20px', background:'linear-gradient(135deg,#6366f1,#4f46e5)', color:'#fff', borderRadius:10, fontWeight:700, fontSize:14, textDecoration:'none', whiteSpace:'nowrap', boxShadow:'0 4px 14px rgba(99,102,241,.35)', transition:'all .2s' } },
        'Take the Survey →'
      )
    ),

    // Methodology
    e('div', { className:'card' },
      e(SectionLabel, { text:'Methodology' }),
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:20, marginBottom:12 } }, 'Data Collection & Analysis'),
      e('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 } },
        e('div', { style:{ background:'#f8fafc', borderRadius:10, padding:'16px 18px' } },
          e('p', { style:{ fontWeight:700, color:'#1d6fde', marginBottom:6 } }, 'Qualitative Strand'),
          e('p', { style:{ fontSize:13.5, color:'#475569', lineHeight:1.65 } },
            'Semi-structured interviews were conducted with the campus administrator and IT director. Responses were analyzed thematically to surface patterns related to vision, infrastructure, and constraint.'
          )
        ),
        e('div', { style:{ background:'#f8fafc', borderRadius:10, padding:'16px 18px' } },
          e('p', { style:{ fontWeight:700, color:'#7c3aed', marginBottom:6 } }, 'Quantitative Strand'),
          e('p', { style:{ fontSize:13.5, color:'#475569', lineHeight:1.65 } },
            'Structured surveys were distributed to teachers spanning Kindergarten through Grade 12, capturing device preferences, frequency of use, perceived challenges, and professional development needs.'
          )
        )
      )
    )
  );
}

/* ── 2. ADMIN VISION ─────────────────────────── */
function AdminPanel() {
  return e('div', { className:'fade-up' },
    e(SectionLabel, { text:'Section 1' }),
    e('h2', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:28, marginBottom:20, color:'#0f172a' } }, 'Administrator Perspectives on Vision & Integration'),

    e('div', { className:'card', style:{ marginBottom:24 } },
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15, marginBottom:18 } },
        'During the semi-structured administration interview, the campus administrator articulated a vision in which technology functions as an invisible catalyst for higher-order pedagogical approaches, specifically Inquiry-Based Learning (IBL) and Project-Based Learning (PBL). The administrator emphasized a deliberate transition away from passive consumption of digital content toward student-led creation, peer collaboration, and participation in global learning communities — objectives directly aligned with the "Redefinition" tier of the SAMR model (Puentedura, 2006).'
      ),
      e(PullQuote, null,
        '"Technology must act as an invisible catalyst for Inquiry-Based Learning and Project-Based Learning. We must move away from passive screen time toward student-led creation and global collaboration."'
      )
    ),

    e('div', { className:'card', style:{ background:'linear-gradient(135deg,#0d1b2a,#1d3461)', marginBottom:24 } },
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:20, color:'#fff', marginBottom:16 } }, 'Proposed Tiered 1:1 Device Rollout'),
      e('p', { style:{ color:'#94a3b8', fontSize:14, marginBottom:20, lineHeight:1.65 } },
        'The administrator strongly endorsed a differentiated, phased approach to device procurement, predicated on developmental and pedagogical appropriateness at each grade band.'
      ),
      e('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 } },
        e('div', { style:{ background:'rgba(255,255,255,.07)', borderRadius:12, padding:'20px', borderLeft:'4px solid #3b82f6' } },
          e('div', { style:{ display:'flex', alignItems:'center', gap:8, marginBottom:10 } },
            e('span', { style:{ background:'#1d6fde', borderRadius:6, padding:'4px 10px', fontSize:11, fontWeight:700, color:'#fff', letterSpacing:1 } }, 'GRADES K–2'),
          ),
          e('p', { style:{ color:'#fff', fontWeight:700, fontSize:16, marginBottom:8 } }, 'iPads / Tablets'),
          e('p', { style:{ color:'#94a3b8', fontSize:13, lineHeight:1.65 } },
            'Intuitive touch interfaces and unrestricted spatial mobility are developmentally critical for early learners who are simultaneously refining fine motor skills. The app ecosystem supports multimedia creation at early literacy levels.'
          )
        ),
        e('div', { style:{ background:'rgba(255,255,255,.07)', borderRadius:12, padding:'20px', borderLeft:'4px solid #8b5cf6' } },
          e('div', { style:{ display:'flex', alignItems:'center', gap:8, marginBottom:10 } },
            e('span', { style:{ background:'#7c3aed', borderRadius:6, padding:'4px 10px', fontSize:11, fontWeight:700, color:'#fff', letterSpacing:1 } }, 'GRADES 3–12'),
          ),
          e('p', { style:{ color:'#fff', fontWeight:700, fontSize:16, marginBottom:8 } }, 'Chromebooks'),
          e('p', { style:{ color:'#94a3b8', fontSize:13, lineHeight:1.65 } },
            'Cost-effective, keyboard-ready devices essential for research paper composition, cloud-based collaborative platforms (e.g., Google Workspace), and standardized test preparation. Chrome OS provides centralized management via Google Admin Console.'
          )
        )
      )
    ),

    e('div', { className:'citation-box' },
      'Administrative vision aligns with SAMR Redefinition (Puentedura, 2006) and the Technological Pedagogical Content Knowledge (TPACK) Framework (Koehler & Mishra, 2009).'
    )
  );
}

/* ── 3. TEACHER INSIGHTS ─────────────────────── */
function TeachersPanel() {
  return e('div', { className:'fade-up' },
    e(SectionLabel, { text:'Section 2' }),
    e('h2', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:28, marginBottom:20, color:'#0f172a' } }, 'Teacher Perspectives on Classroom Technology'),

    e('div', { className:'card', style:{ marginBottom:24 } },
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15, marginBottom:14 } },

      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15 } },
        'While teachers reported leveraging platforms such as Canvas LMS and Google Classroom for independent reading programs, video-based instructional content, and adaptive math practice, these applications predominantly reflect the "Substitution" tier of the SAMR framework — digitizing traditional analogue activities without functional transformation of the learning process.'

    { level:'Redefinition',   color:'#10b981', bg:'#ecfdf5', current:false, desc:'Technology enables creation of new tasks previously inconceivable (e.g., global project publication).' },
  ];

  return e('div', { className:'fade-up' },
    e(SectionLabel, { text:'Section 4' }),
    e('h2', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:28, marginBottom:20, color:'#0f172a' } }, 'Analytical Framework: Technology\'s Impact on the Learning Climate'),

    e('div', { className:'card', style:{ marginBottom:24 } },
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15, marginBottom:14 } },
        'An analysis of cross-stakeholder data through the dual lens of the SAMR model (Puentedura, 2006) and the TPACK framework (Koehler & Mishra, 2009) reveals a campus technology environment characterized by systemic underutilization of available digital tools. The predominant mode of device deployment currently reflects the "Substitution" and "Augmentation" tiers of SAMR, wherein technology largely serves as a digital analogue to pre-existing analogue instructional methods rather than as a transformative pedagogical instrument.'
      ),
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15 } },
        'This stagnation is attributable to three compounding factors: (1) an inconsistent hardware ecosystem that creates differential opportunity between classrooms; (2) the absence of a coherent professional development architecture aligned with pedagogical technology integration as distinct from device troubleshooting; and (3) infrastructure instability — specifically, wireless dead zones — that erodes teacher confidence and willingness to design technology-dependent lessons.'
      )
    ),

    // SAMR ladder
    e('div', { className:'card', style:{ marginBottom:24 } },
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:19, marginBottom:6 } }, 'SAMR Model: Current Campus Positioning'),
      e('p', { style:{ fontSize:13, color:'#64748b', marginBottom:18 } }, 'Highlighted tiers reflect the current operational range identified through survey and interview analysis.'),
      e('div', { style:{ display:'flex', flexDirection:'column', gap:10 } },
        ...samrLevels.map(s =>
          e('div', { key:s.level, style:{ display:'flex', alignItems:'flex-start', gap:14, padding:'14px 16px', borderRadius:10, background:s.current?s.bg:'#f8fafc', border:`1.5px solid ${s.current?s.color:'#e2e8f0'}`, opacity:s.current?1:.7 } },
            e('div', { style:{ flexShrink:0, marginTop:2 } },
              s.current
                ? e('div', { style:{ width:10, height:10, borderRadius:'50%', background:s.color, boxShadow:`0 0 0 4px ${s.bg}` } })
                : e('div', { style:{ width:10, height:10, borderRadius:'50%', background:'#cbd5e1' } })
            ),
            e('div', null,
              e('div', { style:{ display:'flex', alignItems:'center', gap:8, marginBottom:4 } },
                e('span', { style:{ fontWeight:700, fontSize:14, color:s.current?s.color:'#64748b' } }, s.level),
                s.current && e('span', { style:{ fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:20, background:s.color, color:'#fff', letterSpacing:.5 } }, 'CURRENT')
              ),
              e('p', { style:{ fontSize:13, color:'#475569', lineHeight:1.6 } }, s.desc)
            )
          )
        )
      )
    ),

    // TPACK
    e('div', { className:'card' },
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:19, marginBottom:12 } }, 'TPACK Framework: Recommended Pathway'),
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15, marginBottom:14 } },
        'Addressing these deficits requires a deliberate reorientation from a hardware-centric to a pedagogy-centric technology strategy through the TPACK framework. TPACK posits that effective technology integration emerges from the productive intersection of Content Knowledge (CK), Pedagogical Knowledge (PK), and Technological Knowledge (TK) — not from any one domain in isolation (Koehler & Mishra, 2009).'
      ),
      e('p', { style:{ color:'#334155', lineHeight:1.8, fontSize:15 } },
        'In practice, rather than students passively consuming instructional video content, they should be leveraging devices to engage in computational thinking, design multimedia research presentations, and collaborate asynchronously with peers on authentic project-based challenges. Zheng et al. (2016) demonstrate through meta-analysis of 96 studies (N = 12,895) that 1:1 device programs yield statistically significant academic gains — but only when accompanied by sustained, pedagogy-focused instructional coaching, a variable currently absent from the campus professional development calendar.'
      )
    )
  );
}

/* ── 6. ACTION PLAN + REFERENCES ─────────────── */

    ),

    e('div', { style:{ display:'flex', flexDirection:'column', gap:14, marginBottom:36 } },
      e(StepCard, {
        num:'1', title:'Phased Device Standardization',

      }),
      e(StepCard, {
        num:'2', title:'Comprehensive Infrastructure Audit',
        desc:'Prior to any new device deployment, commission the IT department to conduct a campus-wide Wi-Fi heat-mapping audit using wireless signal analysis software. The resulting coverage map must identify and remediate all dead zones documented in the teacher survey data, establishing equitable connectivity as a foundational prerequisite for all subsequent initiatives.'
      }),
      e(StepCard, {
        num:'3', title:'Establish a Tech-Integration Task Force',
        desc:'Constitute a standing interdisciplinary committee comprising the IT Director, campus administration, and pedagogical lead teachers from each grade band. This body will convene monthly to ensure that evolving IT capabilities are continuously aligned with instructional needs, creating a feedback loop between infrastructure management and classroom practice.'
      }),
      e(StepCard, {
        num:'4', title:'Implement TPACK-aligned Professional Development',
        desc:'Pivot the professional development calendar away from transactional device training toward sustained, research-informed pedagogical coaching. Mandatory workshop series should focus on 1:1 classroom management protocols and evidence-based strategies for advancing student technology use into the "Modification" and "Redefinition" tiers of the SAMR model, consistent with the approach advocated by Zheng et al. (2016).'
      })
    ),

    // Divider
    e('hr', { style:{ border:'none', borderTop:'1px solid #e2e8f0', marginBottom:32 } }),

    // Works Cited
    e('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:20 } },
      I.Cite({ size:20, color:'#1d6fde' }),
      e('h3', { style:{ fontFamily:"'DM Serif Display',serif", fontSize:22, color:'#0f172a' } }, 'Works Cited')

    e('div', { style:{ background:'#fff', borderRadius:12, border:'1px solid #e2e8f0', padding:'20px 24px' } },
      e('p', { className:'ref-item' },
        e('strong', null, 'Koehler, M. J., & Mishra, P. (2009). '),
        'What is technological pedagogical content knowledge (TPACK)? ',
        e('em', null, 'Contemporary Issues in Technology and Teacher Education, 9'),
        '(1), 60–70.'
      ),
      e('p', { className:'ref-item' },
        e('strong', null, 'Puentedura, R. R. (2006). '),
        e('em', null, 'Transformation, Technology, and Education. '),
        'Retrieved from http://hippasus.com/resources/tte/'
      ),
      e('p', { className:'ref-item', style:{ marginBottom:0 } },
        e('strong', null, 'Zheng, B., Warschauer, M., Lin, C. H., & Chang, C. (2016). '),
        'Learning in one-to-one laptop environments: A meta-analysis and research synthesis. ',
        e('em', null, 'Review of Educational Research, 86'),
        '(4), 1052–1084. https://doi.org/10.3102/0034654316628645'
      )
    )
  );
}

const TABS = [

          e('div', { style:{ width:32, height:32, borderRadius:8, background:'linear-gradient(135deg,#1d6fde,#7c3aed)', display:'flex', alignItems:'center', justifyContent:'center' } },
